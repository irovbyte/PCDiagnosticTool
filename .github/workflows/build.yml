name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish App (Self-Contained)
      run: |
        dotnet publish PCDiagnosticTool.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o ./publish_output
        
    - name: Compile Installer (Inno Setup)
      uses: minicomp/iscc-action@v1
      with:
        iscc_script: Installer.iss
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/PCDiagnosticTool_Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
